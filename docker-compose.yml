services:
  postgres:
    image: postgres:17-alpine
    container_name: fms-postgres
    # parallel worker의 공유메모리(/dev/shm) — Docker 기본 64MB는 PMS 대량 집계 OLTP 폴백 쿼리의
    # parallel hash/sort에서 "could not resize shared memory segment" 유발. 1g로 상향.
    shm_size: 1gb
    environment:
      POSTGRES_DB: fms
      POSTGRES_USER: fms
      POSTGRES_PASSWORD: fms_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema/docker-init/01_init_fms_extension.sql:/docker-entrypoint-initdb.d/01_fms_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fms"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: fms-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fms-redis
    # AOF 영속 — 세션(auth:session:*)이 Redis 재시작에도 보존되도록 (Phase 3)
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Phase 2: 모듈은 host 포트 비공개(게이트웨이만 노출), 인증은 게이트웨이 신뢰 헤더+내부키 ──
  fms-api:
    build:
      context: ./back-end/java-spring
    container_name: fms-api
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/fms
      DB_USER: fms
      DB_PASS: fms_local
      INTERNAL_GATEWAY_KEY: local-compose-internal-key-7c2e
      # 공통코드 캐시(cc:{group}) 리더 체인 — Redis 미가용이어도 DB→Java enum 폴백
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
    depends_on:
      postgres:
        condition: service_healthy

  admin-api:
    build:
      context: ./back-end/java-spring-admin
    container_name: admin-api
    environment:
      ADMIN_DB_URL: jdbc:postgresql://postgres:5432/fms?currentSchema=admin
      ADMIN_DB_USER: fms
      ADMIN_DB_PASS: fms_local
      # admin은 토큰 발급처라 JWT_SECRET 유지
      JWT_SECRET: dev-secret-please-rotate-at-least-32-chars!!
      INTERNAL_GATEWAY_KEY: local-compose-internal-key-7c2e
      # 로그인 세션 번들 기록(auth:session:*) — Redis 다운이어도 로그인은 성공(단명 세션 degrade)
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bms-api:
    build:
      context: ./back-end/java-spring-bms
    container_name: bms-api
    environment:
      BMS_DB_URL: jdbc:postgresql://postgres:5432/fms?currentSchema=bms
      BMS_DB_USER: fms
      BMS_DB_PASS: fms_local
      INTERNAL_GATEWAY_KEY: local-compose-internal-key-7c2e
      # 공통코드 캐시(cc:{group}) 리더 체인 — Redis 미가용이어도 DB→Java enum 폴백
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
    depends_on:
      postgres:
        condition: service_healthy

  pms-api:
    build:
      context: ./back-end/java-spring-pms
    container_name: pms-api
    environment:
      # PMS 는 스키마 미소유(읽기 전용 cross-schema) — currentSchema 미지정, 엔티티가 @Table(schema=...) 명시
      PMS_DB_URL: jdbc:postgresql://postgres:5432/fms
      PMS_DB_USER: fms
      PMS_DB_PASS: fms_local
      INTERNAL_GATEWAY_KEY: local-compose-internal-key-7c2e
      # ── Mart (MongoDB OLAP) — docker 스택 기본 ON(mongo 동반). 끄려면 .env에 PMS_MART_ENABLED=false ──
      # (bare bootRun은 application.yml 기본값 false — mongo 없이도 OLTP로 동작)
      PMS_MART_ENABLED: "${PMS_MART_ENABLED:-true}"
      PMS_MART_ROUTING: "${PMS_MART_ROUTING:-auto}"
      MONGO_URI: "${MONGO_URI:-mongodb://mongo:27017/pms_mart}"
      PMS_MART_BATCH_SIZE: "${PMS_MART_BATCH_SIZE:-2000}"
      PMS_MART_PARALLELISM: "${PMS_MART_PARALLELISM:-4}"
      # ── line-grain(실적일자/서류일자 + 차원) 가속 — docker 기본 ON(자가관리: 빈 Mart면 기동 시 자동 rebuild·그 동안 OLTP 폴백) ──
      PMS_MART_LINE_ACCEL_ENABLED: "${PMS_MART_LINE_ACCEL_ENABLED:-true}"
      # ── 증분 동기화 스케줄러 — docker 기본 ON, 1분마다 source 변경분 Mart 반영(cron=application.yml) ──
      PMS_MART_SCHEDULER_ENABLED: "${PMS_MART_SCHEDULER_ENABLED:-true}"
      # ── 근사 총건수 $sample 크기 — 큰 doc(lines/docs 배열) random FETCH 비용. 2000=~800ms, 800=~320ms(page 270ms와 합쳐 sub-second). 오차는 밀집(>20000) 구간만·배경 정확 쿼리가 교정 ──
      PMS_MART_APPROX_SAMPLE_SIZE: "${PMS_MART_APPROX_SAMPLE_SIZE:-800}"
      # ── 정확 distinct-count Redis 역색인(RoaringBitmap) — docker 기본 ON. Redis 다운/stale 시 Mongo 정확 count로 자동 폴백(degraded). 기동 시 인덱스 비었으면 자가치유 빌드 ──
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      PMS_MART_COUNT_INDEX_ENABLED: "${PMS_MART_COUNT_INDEX_ENABLED:-true}"
      # ── 벌크 빌드 JVM 누적(3M docs) 힙 헤드룸 — 기본 25%는 플러시 단계 OOM 위험 ──
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=40.0"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── API Gateway (SCG WebFlux) — FE 단일 진입점. 경로 prefix로 4모듈 라우팅 ──
  gateway:
    build:
      context: ./back-end/java-spring-gateway
    container_name: gateway-api
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      FMS_API_URI: http://fms-api:8080
      ADMIN_API_URI: http://admin-api:8081
      BMS_API_URI: http://bms-api:8082
      PMS_API_URI: http://pms-api:8083
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000
      # JWT 중앙 검증(발급 secret과 동일) + 다운스트림 신뢰 헤더 내부키
      JWT_SECRET: dev-secret-please-rotate-at-least-32-chars!!
      INTERNAL_GATEWAY_KEY: local-compose-internal-key-7c2e
      # refresh/logout 로컬 처리용 세션 저장소 — admin 다운 중에도 세션 갱신 생존 (Phase 3)
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
    depends_on:
      fms-api:
        condition: service_started
      admin-api:
        condition: service_started
      bms-api:
        condition: service_started
      pms-api:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      # temurin JRE 이미지에 curl/wget 없음 — bash /dev/tcp로 포트 오픈 확인
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/8084' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./front-end
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8084
        NEXT_PUBLIC_FMS_API_URL: http://localhost:8084
        NEXT_PUBLIC_ADMIN_API_URL: http://localhost:8084
        NEXT_PUBLIC_BMS_API_URL: http://localhost:8084
        NEXT_PUBLIC_PMS_API_URL: http://localhost:8084
        NEXT_PUBLIC_USE_MOCK: "false"
    container_name: fms-frontend
    ports:
      - "3000:3000"
    depends_on:
      - gateway

volumes:
  postgres_data:
  mongo_data:
  redis_data:
