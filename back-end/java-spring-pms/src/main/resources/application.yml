spring:
  application:
    name: java-spring-pms

  # ── Database (fms DB 읽기 전용 접속 — bms·fms 스키마 교차 접근) ────
  datasource:
    url: ${PMS_DB_URL:jdbc:postgresql://localhost:5432/fms}
    username: ${PMS_DB_USER:fms}
    password: ${PMS_DB_PASS:fms_local}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: PmsHikariPool
      maximum-pool-size: 10
      minimum-idle: 2

  # ── JPA (스키마는 소유하지 않음 — ddl-auto none, default_schema 없음) ──
  # entities는 @Table(schema="...") 로 스키마를 명시 선언한다.
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: false
    open-in-view: false

  # ── MongoDB Mart (OLAP 사전집계 — pms.mart.enabled 일 때만 실사용) ──
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/pms_mart}
      auto-index-creation: false   # 인덱스는 PmsMartIndexInitializer가 명시 생성

  output:
    ansi:
      enabled: always

# ── Server (FMS 8080 · ADMIN 8081 · BMS 8082 다음) ───────────────
server:
  port: 8083
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
  health:
    mongo:
      # Mart OFF면 mongo 헬스 기여자 비활성 → Mongo 미기동 환경에서도 /health 영향 없음(오늘과 동일)
      enabled: ${PMS_MART_ENABLED:false}

# ── OpenAPI / Swagger ─────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
  default-produces-media-type: application/json

logging:
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    com.freightos: DEBUG

# ── p6spy (SQL 로깅 — 디버그 시에만 임시로 true) ───────────────────
decorator:
  datasource:
    p6spy:
      enable-logging: false

# ── CORS ─────────────────────────────────────────────────────────
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# ── JWT (admin·fms·bms 와 동일 secret 공유 — HS256 대칭키 검증) ────
jwt:
  secret: ${JWT_SECRET:dev-secret-please-rotate-at-least-32-chars!!}
  access-token-ttl-minutes: ${JWT_ACCESS_TTL:15}
  refresh-token-ttl-days: ${JWT_REFRESH_TTL:14}

# ── PMS Mart (MongoDB OLAP — OLTP 어댑터와 병존, 기본 OFF) ──────────
# enabled=false면 라우터/Mart/스케줄러 빈 미생성 → 동작은 OLTP 그대로(오늘과 동일).
pms:
  mart:
    enabled: ${PMS_MART_ENABLED:false}
    routing: ${PMS_MART_ROUTING:auto}          # auto = 미지원 필터 OLTP 폴백 | mart-only = 항상 Mart
    rebuild:
      batch-size: ${PMS_MART_BATCH_SIZE:2000}
      fetch-size: ${PMS_MART_FETCH_SIZE:2000}
      parallelism: ${PMS_MART_PARALLELISM:4}   # full rebuild 레인지 병렬 워커 수(증분은 단일)
    scheduler:
      enabled: ${PMS_MART_SCHEDULER_ENABLED:false}
      cron: "${PMS_MART_CRON:0 */1 * * * *}"    # 1분 증분(켤 때만)
      jitter-max-ms: ${PMS_MART_JITTER_MAX_MS:15000}
      watermark-overlap-seconds: ${PMS_MART_WATERMARK_OVERLAP_SECONDS:10}
    line-accel:
      enabled: ${PMS_MART_LINE_ACCEL_ENABLED:false}
      early-term-threshold: ${PMS_MART_LINE_EARLY_TERM_THRESHOLD:20000}
      approx-sample-size: ${PMS_MART_APPROX_SAMPLE_SIZE:20000}
