spring:
  application:
    name: java-spring-pms

  # ── Database (fms DB 읽기 전용 접속 — bms·fms 스키마 교차 접근) ────
  datasource:
    url: ${PMS_DB_URL:jdbc:postgresql://localhost:5432/fms}
    username: ${PMS_DB_USER:fms}
    password: ${PMS_DB_PASS:fms_local}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: PmsHikariPool
      maximum-pool-size: 10
      minimum-idle: 2

  # ── JPA (스키마는 소유하지 않음 — ddl-auto none, default_schema 없음) ──
  # entities는 @Table(schema="...") 로 스키마를 명시 선언한다.
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: false
    open-in-view: false

  # ── MongoDB Mart (OLAP 사전집계 — pms.mart.enabled 일 때만 실사용) ──
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/pms_mart}
      auto-index-creation: false   # 인덱스는 PmsMartIndexInitializer가 명시 생성
    # ── Redis (Count Index 역색인 — pms.mart.count-index.enabled 일 때만 실사용) ──
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      # count-index 파이프라인 고려 3s 유지, 공통코드 체인은 실패 삼킴
      timeout: 3000ms
      connect-timeout: 1000ms

  output:
    ansi:
      enabled: always

# ── Server (FMS 8080 · ADMIN 8081 · BMS 8082 다음) ───────────────
server:
  port: 8083
  # 게이트웨이 주입 헤더(JWT 권한 클레임+X-Auth-*)가 기본 8KB 초과 — 32KB로 상향
  max-http-request-header-size: 32KB
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
  health:
    mongo:
      # Mart OFF면 mongo 헬스 기여자 비활성 → Mongo 미기동 환경에서도 /health 영향 없음(오늘과 동일)
      enabled: ${PMS_MART_ENABLED:false}

# ── OpenAPI / Swagger ─────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
  default-produces-media-type: application/json

logging:
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    com.freightos: DEBUG

# ── Resilience4j — Mongo Mart 회로차단기 ─────────────────────────
# Mart supplier만 차단기로 감싼다. OLTP 분기는 차단기 밖.
# DataAccessException/MongoException → 실패 집계·OLTP 폴백.
# PmsQueryCancelledException → ignoreExceptions(트립 없음, 409 전파).
resilience4j:
  circuitbreaker:
    instances:
      pmsMart:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        registerHealthIndicator: false
        recordExceptions:
          - org.springframework.dao.DataAccessException
          - com.mongodb.MongoException
          # 미등재 시 타임아웃이 '성공' 집계 → half-dead Mongo에서 CB 영구 CLOSED 상태가 된다
          - com.freightos.pms.adapter.out.routing.PmsMartQueryTimeoutException
        ignoreExceptions:
          - com.freightos.pms.adapter.out.mart.cancel.PmsQueryCancelledException
      pmsCountIndex:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        registerHealthIndicator: false
        recordExceptions:
          - org.springframework.dao.DataAccessException
          - org.springframework.data.redis.RedisConnectionFailureException
        ignoreExceptions:
          - com.freightos.pms.adapter.out.mart.cancel.PmsQueryCancelledException
  retry:
    instances:
      pmsMart:
        maxAttempts: 2          # 원호출 + 1회 재시도
        waitDuration: 200ms
        ignoreExceptions:        # 선언적 이중 안전망(Customizer 술어와 중복, 가독성 목적)
          - com.freightos.pms.adapter.out.mart.cancel.PmsQueryCancelledException
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
          - com.freightos.pms.adapter.out.routing.PmsMartQueryTimeoutException
        # retryExceptions 의도적 미사용 — RetryConfigCustomizer 술어가 단독 결정(우선순위 혼선 방지)
  timelimiter:
    instances:
      pmsMart:
        timeoutDuration: ${PMS_MART_QUERY_TIMEOUT:15s}   # 합법 최장 Mart 작업(깊은 페이지점프 ~10s) 위
        cancelRunningFuture: true   # best-effort 인터럽트(소켓 read는 비중단)
  bulkhead:
    instances:
      pmsOltpSearch:
        maxConcurrentCalls: 5   # Hikari 10 = 검색 5 + full rebuild ETL parallelism 4 + 여유 1
        maxWaitDuration: 2s
  ratelimiter:
    instances:
      pmsMartRebuild:
        limitForPeriod: 1
        limitRefreshPeriod: 60s
        timeoutDuration: 0      # 초과 즉시 RequestNotPermitted → 429

# ── p6spy (SQL 로깅 — 디버그 시에만 임시로 true) ───────────────────
decorator:
  datasource:
    p6spy:
      enable-logging: false

# ── 게이트웨이 신뢰 토큰 (게이트웨이와 동일 기본값 공유) ─────────────
gateway:
  internal-token: ${INTERNAL_GATEWAY_KEY:dev-internal-gateway-key-change-me}

# ── PMS Mart (MongoDB OLAP — OLTP 어댑터와 병존, 기본 OFF) ──────────
# enabled=false면 라우터/Mart/스케줄러 빈 미생성 → 동작은 OLTP 그대로(오늘과 동일).
pms:
  mart:
    enabled: ${PMS_MART_ENABLED:false}
    routing: ${PMS_MART_ROUTING:auto}          # auto = 미지원 필터 OLTP 폴백 | mart-only = 항상 Mart
    rebuild:
      batch-size: ${PMS_MART_BATCH_SIZE:2000}
      fetch-size: ${PMS_MART_FETCH_SIZE:2000}
      parallelism: ${PMS_MART_PARALLELISM:4}   # full rebuild 레인지 병렬 워커 수(증분은 단일)
    scheduler:
      enabled: ${PMS_MART_SCHEDULER_ENABLED:false}
      cron: "${PMS_MART_CRON:0 */1 * * * *}"    # 1분 증분(켤 때만)
      jitter-max-ms: ${PMS_MART_JITTER_MAX_MS:15000}
      watermark-overlap-seconds: ${PMS_MART_WATERMARK_OVERLAP_SECONDS:10}
    line-accel:
      enabled: ${PMS_MART_LINE_ACCEL_ENABLED:false}
      early-term-threshold: ${PMS_MART_LINE_EARLY_TERM_THRESHOLD:20000}
      approx-sample-size: ${PMS_MART_APPROX_SAMPLE_SIZE:800}
      exact-count-timeout-ms: ${PMS_MART_EXACT_COUNT_TIMEOUT_MS:30000}
      deep-jump-offset-threshold: ${PMS_MART_DEEP_JUMP_OFFSET_THRESHOLD:3000}
    bootstrap:
      auto-rebuild: ${PMS_MART_BOOTSTRAP_AUTO_REBUILD:true}
    query-timeout: ${PMS_MART_QUERY_TIMEOUT:15s}   # Mart 페이지 find 서버측 maxTime — TimeLimiter와 동일 예산
    mongo:
      server-selection-timeout-ms: ${PMS_MART_MONGO_SERVER_SELECTION_TIMEOUT_MS:3000}
      connect-timeout-ms: ${PMS_MART_MONGO_CONNECT_TIMEOUT_MS:2000}
    count-index:
      enabled: ${PMS_MART_COUNT_INDEX_ENABLED:false}
      key-prefix: "pms:ix"
      stale-tolerance-seconds: 120
      max-distinct-scan: 2000000
      max-day-buckets: 1500
      max-collapse-fd-ids: ${PMS_MART_COUNT_INDEX_MAX_COLLAPSE_FD_IDS:2000000}
