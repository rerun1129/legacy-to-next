server:
  port: 8084

spring:
  application:
    name: gateway

  # в”Җв”Җ Redis (м„ём…ҳ м ҖмһҘмҶҢ вҖ” refresh/logout лЎңм»¬ мІҳлҰ¬) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2s            # command timeout вҖ” мҙҲкіј мӢң мҳҲмҷё вҶ’ м–ҙлҢ‘н„°к°Җ мӮјнӮӨкі  лЎңк·ёмқё кі„мҶҚ(degrade)
      connect-timeout: 1s

  cloud:
    gateway:
      # лӢӨмҡҙмҠӨнҠёлҰј м •м§Җ мӢң Netty connect кё°ліё 30s лҢҖкё° вҶ’ CB fallback(503)к№Ңм§Җ м§Җм—°. 3sлЎң лӢЁм¶•.
      # мқ‘лӢө read нғҖмһ„м•„мӣғмқҖ resilience4j TimeLimiter(60s/pmsCb 600s)к°Җ лӢҙлӢ№ вҖ” response-timeout лҜём„Өм • мң м§Җ.
      httpclient:
        connect-timeout: 3000   # ms (м •мҲҳ)

      # Phase 1 лҸҷм•Ҳ лӢӨмҡҙмҠӨнҠёлҰј лӘЁл“ҲлҸ„ CORS н—ӨлҚ”лҘј л¶ҷмқҙлҜҖлЎң мӨ‘ліө м ңкұ°
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin, RETAIN_UNIQUE

      globalcors:
        # FMS WebMvcConfig кё°мӨҖ лҜёлҹ¬л§Ғ.
        # BMSк°Җ PATCHлҘј мӮ¬мҡ©н•ҳлҜҖлЎң allowedMethodsм—җ PATCH м¶”к°Җ.
        cors-configurations:
          '[/**]':
            allowedOrigins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: '*'
            exposedHeaders:
              - Location
            allowCredentials: false
            maxAge: 3600

      routes:
        # admin-route: /api/admin/** вҖ” order 0 (кө¬мІҙм Ғ кІҪлЎң мҡ°м„ )
        - id: admin-route
          uri: ${ADMIN_API_URI:http://localhost:8081}
          predicates:
            - Path=/api/admin/**
          order: 0
          filters:
            - name: CircuitBreaker
              args:
                name: adminCb
                fallbackUri: forward:/fallback/admin

        # bms-route: /api/bms/** вҖ” order 0
        - id: bms-route
          uri: ${BMS_API_URI:http://localhost:8082}
          predicates:
            - Path=/api/bms/**
          order: 0
          filters:
            - name: CircuitBreaker
              args:
                name: bmsCb
                fallbackUri: forward:/fallback/bms

        # pms-route: /api/pms/** вҖ” order 0
        - id: pms-route
          uri: ${PMS_API_URI:http://localhost:8083}
          predicates:
            - Path=/api/pms/**
          order: 0
          filters:
            - name: CircuitBreaker
              args:
                name: pmsCb
                fallbackUri: forward:/fallback/pms

        # fms-route: /api/** вҖ” order 10 (catch-all, л°ҳл“ңмӢң л’Ө)
        - id: fms-route
          uri: ${FMS_API_URI:http://localhost:8080}
          predicates:
            - Path=/api/**
          order: 10
          filters:
            - name: CircuitBreaker
              args:
                name: fmsCb
                fallbackUri: forward:/fallback/fms

# в”Җв”Җ JWT (adminкіј лҸҷмқј secret кіөмң  вҖ” HS256 лҢҖм№ӯнӮӨ кІҖмҰқВ·л°ңкёү) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# access-token-ttl-minutes / refresh-token-ttl-days: admin кё°ліёк°’кіј лҸҷмқј.
jwt:
  secret: ${JWT_SECRET:dev-secret-please-rotate-at-least-32-chars!!}
  access-token-ttl-minutes: ${JWT_ACCESS_TTL:15}
  refresh-token-ttl-days: ${JWT_REFRESH_TTL:14}

# в”Җв”Җ лӮҙл¶Җ кіөмң нӮӨ вҖ” лӢӨмҡҙмҠӨнҠёлҰјмқҙ кІҢмқҙнҠёмӣЁмқҙ кІҪмң  м—¬л¶ҖлҘј нҷ•мқё в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# лӘЁл“  лӢӨмҡҙмҠӨнҠёлҰј лӘЁл“Ҳкіј лҸҷмқј кё°ліёк°’мңјлЎң н•©мқҳ. мҡҙмҳҒ мӢң л°ҳл“ңмӢң көҗмІҙ.
gateway:
  internal-token: ${INTERNAL_GATEWAY_KEY:dev-internal-gateway-key-change-me}

management:
  endpoints:
    web:
      exposure:
        include: health

resilience4j:
  circuitbreaker:
    instances:
      # кІҢмқҙнҠёмӣЁмқҙ лЎңм»¬ м„ём…ҳ м—°мӮ°(refresh/logout)мқҳ Redis мһҘм•  м°ЁлӢЁ.
      # мҠ¬лқјмқҙл”© мңҲлҸ„мҡ° 5кұҙ мӨ‘ 80% мқҙмғҒ мӢӨнҢЁ мӢң OPEN, 30s нӣ„ HALF-OPEN.
      gatewaySession:
        slidingWindowSize: 5
        failureRateThreshold: 80
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 2
      adminCb:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
      bmsCb:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
      pmsCb:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
      fmsCb:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3

  timelimiter:
    # Spring Cloud CircuitBreaker TimeLimiter кё°ліёк°’ 1мҙҲк°Җ лҢҖл¶Җл¶„мқҳ APIлҘј м°ЁлӢЁн•ҳлҜҖлЎң лӘ…мӢң м„Өм • н•„мҲҳ.
    # PMS mart rebuildлҠ” лҸҷкё° мһ‘м—…мңјлЎң л¶„ лӢЁмң„ мҶҢмҡ” вҖ” кІҢмқҙнҠёмӣЁмқҙм—җм„ң лҒҠкё°м§Җ м•ҠлҸ„лЎқ 600s м„Өм •.
    instances:
      adminCb:
        timeoutDuration: 60s
      bmsCb:
        timeoutDuration: 60s
      pmsCb:
        timeoutDuration: 600s
      fmsCb:
        timeoutDuration: 60s
