server:
  port: 8084
  # 게이트웨이 주입 헤더(JWT 권한 클레임+X-Auth-*)가 기본 8KB 초과 — 32KB로 상향
  max-http-request-header-size: 32KB

spring:
  application:
    name: gateway

  # ── Redis (세션 저장소 — refresh/logout 로컬 처리) ─────────────────
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2s            # command timeout — 초과 시 예외 → 어댑터가 삼키고 로그인 계속(degrade)
      connect-timeout: 1s

  cloud:
    gateway:
      # 다운스트림 정지 시 Netty connect 기본 30s 대기 → CB fallback(503)까지 지연. 3s로 단축.
      # 응답 read 타임아웃은 resilience4j TimeLimiter(60s/pmsCb 600s)가 담당 — response-timeout 미설정 유지.
      httpclient:
        connect-timeout: 3000   # ms (정수)

      # Phase 1 동안 다운스트림 모듈도 CORS 헤더를 붙이므로 중복 제거
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin, RETAIN_UNIQUE

      globalcors:
        # FMS WebMvcConfig 기준 미러링.
        # BMS가 PATCH를 사용하므로 allowedMethods에 PATCH 추가.
        cors-configurations:
          '[/**]':
            allowedOrigins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: '*'
            exposedHeaders:
              - Location
            allowCredentials: false
            maxAge: 3600

      routes:
        # admin-route: /api/admin/** — order 0 (구체적 경로 우선)
        - id: admin-route
          uri: ${ADMIN_API_URI:http://localhost:8081}
          predicates:
            - Path=/api/admin/**
          order: 0
          filters:
            - name: CircuitBreaker
              args:
                name: adminCb
                fallbackUri: forward:/fallback/admin

        # bms-route: /api/bms/** — order 0
        - id: bms-route
          uri: ${BMS_API_URI:http://localhost:8082}
          predicates:
            - Path=/api/bms/**
          order: 0
          filters:
            - name: CircuitBreaker
              args:
                name: bmsCb
                fallbackUri: forward:/fallback/bms

        # pms-route: /api/pms/** — order 0
        - id: pms-route
          uri: ${PMS_API_URI:http://localhost:8083}
          predicates:
            - Path=/api/pms/**
          order: 0
          filters:
            - name: CircuitBreaker
              args:
                name: pmsCb
                fallbackUri: forward:/fallback/pms

        # fms-route: /api/** — order 10 (catch-all, 반드시 뒤)
        - id: fms-route
          uri: ${FMS_API_URI:http://localhost:8080}
          predicates:
            - Path=/api/**
          order: 10
          filters:
            - name: CircuitBreaker
              args:
                name: fmsCb
                fallbackUri: forward:/fallback/fms

# ── JWT (admin과 동일 secret 공유 — HS256 대칭키 검증·발급) ──────────
# access-token-ttl-minutes / refresh-token-ttl-days: admin 기본값과 동일.
jwt:
  secret: ${JWT_SECRET:dev-secret-please-rotate-at-least-32-chars!!}
  access-token-ttl-minutes: ${JWT_ACCESS_TTL:15}
  refresh-token-ttl-days: ${JWT_REFRESH_TTL:14}

# ── 내부 공유키 — 다운스트림이 게이트웨이 경유 여부를 확인 ──────────────
# 모든 다운스트림 모듈과 동일 기본값으로 합의. 운영 시 반드시 교체.
gateway:
  internal-token: ${INTERNAL_GATEWAY_KEY:dev-internal-gateway-key-change-me}

management:
  endpoints:
    web:
      exposure:
        include: health

resilience4j:
  circuitbreaker:
    instances:
      # 게이트웨이 로컬 세션 연산(refresh/logout)의 Redis 장애 차단.
      # 슬라이딩 윈도우 5건 중 80% 이상 실패 시 OPEN, 30s 후 HALF-OPEN.
      gatewaySession:
        slidingWindowSize: 5
        failureRateThreshold: 80
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 2
      adminCb:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
      bmsCb:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
      pmsCb:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
      fmsCb:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3

  timelimiter:
    # Spring Cloud CircuitBreaker TimeLimiter 기본값 1초가 대부분의 API를 차단하므로 명시 설정 필수.
    # PMS mart rebuild는 동기 작업으로 분 단위 소요 — 게이트웨이에서 끊기지 않도록 600s 설정.
    instances:
      adminCb:
        timeoutDuration: 60s
      bmsCb:
        timeoutDuration: 60s
      pmsCb:
        timeoutDuration: 600s
      fmsCb:
        timeoutDuration: 60s
