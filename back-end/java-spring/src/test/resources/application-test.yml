spring:
  datasource:
    url: jdbc:h2:mem:fmstest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: false
        hbm2ddl:
          create_namespaces: true
  flyway:
    enabled: false
logging:
  level:
    com.freightos.fms: WARN
    org.hibernate.SQL: WARN

# JWT 설정 — 테스트 전용 고정 secret (컨텍스트 로딩 시 JwtProperties 바인딩 필요)
jwt:
  secret: test-secret-fixed-value-32-chars-ok
  access-token-ttl-minutes: 15
  refresh-token-ttl-days: 14
