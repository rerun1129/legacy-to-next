spring:
  datasource:
    url: jdbc:h2:mem:fmstest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: false
        hbm2ddl:
          create_namespaces: true
  flyway:
    enabled: false
logging:
  level:
    com.freightos.fms: WARN
    org.hibernate.SQL: WARN
