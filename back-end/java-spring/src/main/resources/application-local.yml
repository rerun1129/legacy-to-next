# 로컬 개발 환경 override
spring:
  jpa:
    hibernate:
      ddl-auto: none   # 엔티티→스키마 자동 생성 필요 시 create-drop 으로 변경
    show-sql: false
  flyway:
    enabled: false     # 스키마 확정 후 true

decorator:
  datasource:
    p6spy:
      enable-logging: true

logging:
  level:
    com.freightos.fms: DEBUG
    p6spy: INFO
