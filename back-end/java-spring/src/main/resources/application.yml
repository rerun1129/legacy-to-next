spring:
  application:
    name: fms-java

  # ── Database ──────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fms}
    username: ${DB_USER:fms}
    password: ${DB_PASS:fms_local}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: FmsHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

  # ── JPA ───────────────────────────────────────────────────────────
  jpa:
    hibernate:
      # 스키마는 Flyway로 관리. 운영에서는 none / 초기 개발 시 validate
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  # ── Redis (공통코드 폴백 체인 1단계 캐시 — 2s 타임아웃, 실패 시 DB 폴백) ──
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms
      connect-timeout: 1000ms

  # ── Flyway ────────────────────────────────────────────────────────
  # fms 스키마 정본 = db/migration. 기존 DB는 baseline-on-migrate로 V1 스킵, 신규 DB는 V1 실행.
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: fms          # history 테이블 = fms.flyway_schema_history
    baseline-on-migrate: true
    validate-on-migrate: true

  # ── Logging ───────────────────────────────────────────────────────
  output:
    ansi:
      enabled: always

# ── Server ────────────────────────────────────────────────────────
server:
  port: 8080
  # 게이트웨이 주입 헤더(JWT 권한 클레임+X-Auth-*)가 기본 8KB 초과 — 32KB로 상향
  max-http-request-header-size: 32KB
  error:
    include-message: always
    include-binding-errors: always

# ── Actuator ──────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always

# ── OpenAPI / Swagger ─────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
  api-docs:
    path: /v3/api-docs
  default-produces-media-type: application/json

# ── Logging ───────────────────────────────────────────────────────
logging:
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    com.freightos.fms: DEBUG

# ── p6spy (SQL 로깅 — 로컬 프로파일에서만 활성화) ──────────────────
decorator:
  datasource:
    p6spy:
      enable-logging: false

# ── 게이트웨이 신뢰 토큰 (게이트웨이와 동일 기본값 공유) ─────────────
gateway:
  internal-token: ${INTERNAL_GATEWAY_KEY:dev-internal-gateway-key-change-me}
