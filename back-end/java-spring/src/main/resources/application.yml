spring:
  application:
    name: fms-java

  # ── Database ──────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fms}
    username: ${DB_USER:fms}
    password: ${DB_PASS:fms_local}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: FmsHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

  # ── JPA ───────────────────────────────────────────────────────────
  jpa:
    hibernate:
      # 스키마는 Flyway로 관리. 운영에서는 none / 초기 개발 시 validate
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  # ── Redis (공통코드 폴백 체인 1단계 캐시 — 2s 타임아웃, 실패 시 DB 폴백) ──
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms
      connect-timeout: 1000ms

  # ── Flyway ────────────────────────────────────────────────────────
  # fms 스키마 정본 = db/migration. 기존 DB는 baseline-on-migrate로 V1 스킵, 신규 DB는 V1 실행.
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: fms          # history 테이블 = fms.flyway_schema_history
    baseline-on-migrate: true
    validate-on-migrate: true

  # ── Multipart (첨부파일 업로드) ─────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

  # ── Logging ───────────────────────────────────────────────────────
  output:
    ansi:
      enabled: always

# ── Server ────────────────────────────────────────────────────────
server:
  port: 8080
  # 게이트웨이 주입 헤더(JWT 권한 클레임+X-Auth-*)가 기본 8KB 초과 — 32KB로 상향
  max-http-request-header-size: 32KB
  error:
    include-message: always
    include-binding-errors: always

# ── Actuator ──────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always

# ── OpenAPI / Swagger ─────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
  api-docs:
    path: /v3/api-docs
  default-produces-media-type: application/json

# ── Logging ───────────────────────────────────────────────────────
logging:
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    com.freightos.fms: DEBUG

# ── p6spy (SQL 로깅 — 로컬 프로파일에서만 활성화) ──────────────────
decorator:
  datasource:
    p6spy:
      enable-logging: false

# ── 게이트웨이 신뢰 토큰 (게이트웨이와 동일 기본값 공유) ─────────────
gateway:
  internal-token: ${INTERNAL_GATEWAY_KEY:dev-internal-gateway-key-change-me}

# ── 첨부파일 스토리지 ───────────────────────────────────────────────
fms:
  storage:
    mode: ${FMS_STORAGE_MODE:local}        # yml 기본 local 유지 — compose가 s3로 켬
    local:
      base-path: ${FMS_STORAGE_BASE_PATH:./storage/attachments}
    s3:
      bucket: ${FMS_S3_BUCKET:}
      region: ${FMS_S3_REGION:ap-northeast-2}
      key-prefix: ${FMS_S3_KEY_PREFIX:}
      endpoint: ${FMS_S3_ENDPOINT:}        # MinIO/드릴용. 빈값=실 AWS
    cleanup:
      enabled: true
      cron: "${FMS_STORAGE_CLEANUP_CRON:0 0 3 * * *}"   # 드릴 매분 트리거용 env 바인딩 신설
      grace-hours: 24

# ── Resilience4j (S3 서킷브레이커) ───────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      fmsS3:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true   # 무트래픽(03시 배치)에도 자동 half-open
        registerHealthIndicator: false
        slowCallDurationThreshold: 30s
        slowCallRateThreshold: 100
        ignoreExceptions:
          - com.freightos.common.exception.ResourceNotFoundException   # not-found=정상계, 미제외 시 로컬 체인 조회가 CB 허위 트립
