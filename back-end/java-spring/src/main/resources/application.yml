spring:
  application:
    name: fms-java

  # ── Database ──────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fms}
    username: ${DB_USER:fms}
    password: ${DB_PASS:fms_local}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: FmsHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

  # ── JPA ───────────────────────────────────────────────────────────
  jpa:
    hibernate:
      # 스키마는 Flyway로 관리. 운영에서는 none / 초기 개발 시 validate
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        default_schema: legacy_to_next
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  # ── Flyway ────────────────────────────────────────────────────────
  # 스키마 설계 완료 전까지 off. /schema/V*.sql → src/main/resources/db/migration/ 복사 후 활성화.
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Logging ───────────────────────────────────────────────────────
  output:
    ansi:
      enabled: always

# ── Server ────────────────────────────────────────────────────────
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# ── Actuator ──────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always

# ── OpenAPI / Swagger ─────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
  api-docs:
    path: /v3/api-docs
  default-produces-media-type: application/json

# ── Logging ───────────────────────────────────────────────────────
logging:
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    com.freightos.fms: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
