spring:
  application:
    name: fms-java

  # ── Database ──────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fms}
    username: ${DB_USER:fms}
    password: ${DB_PASS:fms_local}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: FmsHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

  # ── JPA ───────────────────────────────────────────────────────────
  jpa:
    hibernate:
      # 스키마는 Flyway로 관리. 운영에서는 none / 초기 개발 시 validate
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  # ── Flyway ────────────────────────────────────────────────────────
  # fms 스키마 정본 = db/migration. 기존 DB는 baseline-on-migrate로 V1 스킵, 신규 DB는 V1 실행.
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: fms          # history 테이블 = fms.flyway_schema_history
    baseline-on-migrate: true
    validate-on-migrate: true

  # ── Logging ───────────────────────────────────────────────────────
  output:
    ansi:
      enabled: always

# ── Server ────────────────────────────────────────────────────────
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# ── Actuator ──────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always

# ── OpenAPI / Swagger ─────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
  api-docs:
    path: /v3/api-docs
  default-produces-media-type: application/json

# ── Logging ───────────────────────────────────────────────────────
logging:
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    com.freightos.fms: DEBUG

# ── p6spy (SQL 로깅 — 로컬 프로파일에서만 활성화) ──────────────────
decorator:
  datasource:
    p6spy:
      enable-logging: false

# ── CORS ─────────────────────────────────────────────────────────
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── JWT (admin과 동일 secret 공유 — HS256 대칭키 검증) ────────────
jwt:
  secret: ${JWT_SECRET:dev-secret-please-rotate-at-least-32-chars!!}
  access-token-ttl-minutes: ${JWT_ACCESS_TTL:15}
  refresh-token-ttl-days: ${JWT_REFRESH_TTL:14}
