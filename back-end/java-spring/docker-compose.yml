services:
  postgres:
    image: postgres:17-alpine
    container_name: fms-postgres
    environment:
      POSTGRES_DB: fms
      POSTGRES_USER: fms
      POSTGRES_PASSWORD: fms_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fms"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
