spring:
  application:
    name: java-spring-admin
  datasource:
    url: ${ADMIN_DB_URL:jdbc:postgresql://localhost:5432/fms?currentSchema=admin}
    username: ${ADMIN_DB_USER:fms}
    password: ${ADMIN_DB_PASS:fms_local}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: AdminHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: admin
        format_sql: true
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: admin
    baseline-on-migrate: true
    validate-on-migrate: true
  output:
    ansi:
      enabled: always

server:
  port: 8081
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    com.freightos.admin: DEBUG

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

jwt:
  secret: ${JWT_SECRET:dev-secret-please-rotate-at-least-32-chars!!}
  access-token-ttl-minutes: ${JWT_ACCESS_TTL:15}
  refresh-token-ttl-days: ${JWT_REFRESH_TTL:14}

